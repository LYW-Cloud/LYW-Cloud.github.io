<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - 道依茨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", Arial, sans-serif;
        }
        :root {
            --main: #0f3460;
            --gray: #222;
            --light-gray: #f5f7fa;
            --gold: #d4af37;
        }

        header {
            background: var(--main);
            color: #fff;
            padding: 0 8%;
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .nav-wrap {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            flex-wrap: wrap;
            gap: 10px 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .logo small {
            font-size: 12px;
            font-weight: normal;
            display: block;
            color: var(--gold);
        }
        nav {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            padding: 6px 12px;
            font-size: 15px;
            transition: 0.3s;
            border-radius: 4px;
        }
        nav a:hover {
            color: var(--gold);
            background: rgba(255,255,255,0.08);
        }

        .search-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            padding: 4px 4px 4px 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: 0.3s;
            flex-shrink: 0;
            height: 40px;
            min-width: 160px;
        }
        .search-wrap:focus-within {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.12);
        }
        .search-wrap input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
            padding: 6px 0;
            width: 110px;
            flex: 1;
            min-width: 50px;
        }
        .search-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .search-wrap input:focus {
            width: 150px;
        }
        .search-wrap button {
            background: var(--gold);
            border: none;
            color: #000;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .search-wrap button:hover {
            opacity: 0.8;
            transform: scale(0.95);
        }

        section {
            padding: 60px 8% 80px;
        }
        .title {
            text-align: center;
            margin-bottom: 40px;
        }
        .title h2 {
            font-size: 32px;
            color: var(--gray);
            margin-bottom: 12px;
        }
        .title span {
            display: inline-block;
            width: 60px;
            height: 3px;
            background: var(--gold);
        }
        .title .sub {
            display: block;
            font-size: 14px;
            color: #999;
            font-weight: normal;
            margin-top: 8px;
        }

        .product-box {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .pro-card {
            background: #fff;
            overflow: hidden;
            box-shadow: 0 2px 12px #e2e2e2;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
        }
        .pro-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px #ccc;
        }
        .pro-img {
            height: 200px;
            background: #e8edf5;
            background-size: cover;
            background-position: center;
            background-color: #e8edf5;
        }
        .pro-text {
            padding: 22px;
        }
        .pro-text h3 {
            margin-bottom: 6px;
            color: var(--gray);
            font-size: 18px;
        }
        .pro-text .en {
            font-size: 13px;
            color: #999;
        }
        .pro-text p {
            margin-top: 8px;
            color: #555;
            font-size: 14px;
        }

        .no-result {
            text-align: center;
            padding: 80px 20px;
            color: #999;
            font-size: 18px;
            grid-column: 1 / -1;
        }
        .no-result .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 20px;
        }
        .no-result a {
            color: var(--main);
            font-weight: bold;
        }

        .result-stats {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .result-stats strong {
            color: var(--main);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--main);
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            color: var(--gold);
        }

        footer {
            background: var(--gray);
            color: #aaa;
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }
        footer .en {
            display: block;
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-card {
            background: #fff;
            max-width: 720px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 40px 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            animation: fadeUp 0.25s ease;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .modal-card .close-btn {
            position: absolute;
            top: 16px;
            right: 22px;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            color: #888;
            transition: 0.2s;
            line-height: 1;
        }
        .modal-card .close-btn:hover {
            color: #000;
            transform: rotate(90deg);
        }
        .modal-card h2 {
            color: var(--main);
            margin-bottom: 6px;
            font-size: 28px;
        }
        .modal-card .sub-title {
            color: #888;
            font-size: 15px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .modal-card .spec-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 24px;
            margin: 20px 0 16px;
        }
        .modal-card .spec-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #eee;
            padding: 6px 0;
        }
        .modal-card .spec-item .label {
            color: #666;
            font-weight: 500;
        }
        .modal-card .spec-item .value {
            color: #222;
            font-weight: 600;
        }
        .modal-card .desc {
            background: #f8faff;
            padding: 16px 18px;
            border-radius: 8px;
            margin: 16px 0 10px;
            color: #333;
            line-height: 1.7;
            border-left: 4px solid var(--gold);
        }
        .modal-card .btn-inline {
            background: var(--main);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-card .btn-inline:hover {
            background: var(--gold);
            color: #000;
        }

        @media (max-width: 900px) {
            .nav-wrap {
                height: auto;
                padding: 12px 0;
            }
            nav a {
                padding: 4px 10px;
                font-size: 13px;
            }
            .search-wrap {
                min-width: 140px;
                height: 36px;
            }
            .search-wrap input {
                width: 80px;
            }
            .search-wrap input:focus {
                width: 120px;
            }
            .product-box {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .nav-wrap {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
                padding: 10px 0;
            }
            .logo {
                font-size: 20px;
                flex: 0 0 auto;
            }
            .logo small {
                font-size: 10px;
            }
            nav {
                order: 3;
                width: 100%;
                justify-content: center;
                gap: 2px;
            }
            nav a {
                font-size: 12px;
                padding: 4px 8px;
            }
            .search-wrap {
                order: 2;
                flex: 1;
                min-width: 120px;
                max-width: 200px;
                height: 34px;
                padding: 3px 3px 3px 12px;
                margin-left: auto;
            }
            .search-wrap input {
                width: 60px;
                font-size: 12px;
                min-width: 30px;
            }
            .search-wrap input:focus {
                width: 80px;
            }
            .search-wrap button {
                font-size: 11px;
                padding: 4px 10px;
                height: 26px;
            }
            .product-box {
                grid-template-columns: 1fr;
            }
            .modal-card {
                padding: 30px 18px;
            }
            .modal-card .spec-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-wrap">
            <div class="logo">
                道依茨
                <small>发动机及配件供应商</small>
            </div>
            <nav>
                <a href="index.html">首页</a>
                <a href="models.html">全部型号</a>
                <a href="index.html#about">关于我们</a>
                <a href="index.html#case">合作案例</a>
                <a href="index.html#contact">联系我们</a>
            </nav>
            <form class="search-wrap" action="search.html" method="get">
                <input type="text" name="q" placeholder="搜索型号..." />
                <button type="submit">搜索</button>
            </form>
        </div>
    </header>

    <section>
        <div class="title">
            <h2>搜索结果</h2>
            <span></span>
            <span class="sub">Search Results</span>
        </div>

        <div class="result-stats" id="resultStats">
            共找到 <strong id="countDisplay">0</strong> 个匹配型号
        </div>

        <div class="product-box" id="resultGrid">
        </div>

        <div class="no-result" id="noResult" style="display:none;">
            <span class="icon">🔍</span>
            没有找到匹配的型号<br>
            <small style="color:#bbb;font-size:14px;">试试其他关键词，如：BF6M、1013、农机、矿卡...</small>
            <br><br>
            <a href="models.html">← 查看全部型号</a>
        </div>

        <div style="text-align:center;margin-top:20px;">
            <a href="index.html" class="back-link">← 返回首页</a>
        </div>
    </section>

    <footer>
        <p>© 2026 道依茨 版权所有</p>
        <span class="en">专业发动机及配件供应商</span>
    </footer>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-card">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h2 id="modalTitle">发动机型号</h2>
            <div class="sub-title" id="modalSub">系列 / 类型</div>
            <div class="spec-grid" id="modalSpecs"></div>
            <div class="desc" id="modalDesc">详细描述信息</div>
            <button class="btn-inline" onclick="document.getElementById('detailModal').classList.remove('active'); window.location.href='index.html#contact';">立即询价 →</button>
        </div>
    </div>

    <script src="engine-data.js"></script>
    <script>
        (function() {
            function getQueryParam(name) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(name) || '';
            }

            const keyword = getQueryParam('q').trim();
            const data = typeof engineData !== 'undefined' ? engineData : [];

            function searchEngines(query) {
                if (!query) return data;
                const lowerQuery = query.toLowerCase();
                return data.filter(eng => {
                    const searchableText = [
                        eng.name,
                        eng.series,
                        ...Object.values(eng.spec),
                        eng.desc
                    ].join(' ').toLowerCase();
                    return searchableText.includes(lowerQuery);
                });
            }

            const results = searchEngines(keyword);
            const grid = document.getElementById('resultGrid');
            const countDisplay = document.getElementById('countDisplay');
            const stats = document.getElementById('resultStats');
            const noResult = document.getElementById('noResult');

            countDisplay.textContent = results.length;

            if (results.length === 0) {
                grid.innerHTML = '';
                noResult.style.display = 'block';
                stats.style.display = 'none';
            } else {
                noResult.style.display = 'none';
                stats.style.display = 'block';
                grid.innerHTML = '';
                results.forEach(eng => {
                    const card = document.createElement('div');
                    card.className = 'pro-card';
                    card.addEventListener('click', function() {
                        openModal(eng);
                    });
                    const imgUrl = eng.img || 'deutz-engine.jpg';
                    card.innerHTML = `
                        <div class="pro-img" style="background-image: url('${imgUrl}');"></div>
                        <div class="pro-text">
                            <h3>${eng.name} <span class="en">${eng.series}</span></h3>
                            <p>${Object.values(eng.spec).slice(0,2).join(' · ')}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            const modal = document.getElementById('detailModal');
            const closeBtn = document.getElementById('closeModalBtn');
            const modalTitle = document.getElementById('modalTitle');
            const modalSub = document.getElementById('modalSub');
            const modalSpecs = document.getElementById('modalSpecs');
            const modalDesc = document.getElementById('modalDesc');

            function openModal(eng) {
                modalTitle.textContent = eng.name;
                modalSub.textContent = eng.series;
                let specHtml = '';
                for (const [key, value] of Object.entries(eng.spec)) {
                    specHtml += `<div class="spec-item"><span class="label">${key}</span><span class="value">${value}</span></div>`;
                }
                modalSpecs.innerHTML = specHtml;
                modalDesc.textContent = eng.desc;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }

            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });
        })();
    </script>
</body>
</html>
